<title>Image Gallery</title>

<style>
body {
  margin: 0;
  background: #111;
  font-family: sans-serif;
}

/* GRID */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  padding: 10px;
}

.gallery img {
  width: 100%;
  height: 180px;
  object-fit: cover; /* FIXES CROPPING ISSUE */
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* FULLSCREEN VIEW */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
}

.viewer img {
  max-width: 90%;
  max-height: 90%;
}
.title{
    text-align: center;
    color: white;
}
.contact {
  background: #e8f5e9;
  padding-left: 30px;
  padding-top: 20px;
}
a{
  color: rgb(12, 12, 12);
}
.whatsapp{
  color: white;
}
.social-media{
  text-align: center;
  padding-bottom: 30px;
}
.media-img{
  width: 25px;
  margin-left: 15px;

}
.main-headings{
  color: black;
}
.whatsapp{
  color: white;
  background-color: #28b74b;
  padding: 10px;
}
</style>

<script>
// SHUFFLE FUNCTION (important)
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

// LOAD JSON
fetch("images.json")
.then(res => res.json())
.then(data => {
  shuffle(data); // shuffle every refresh

  const gallery = document.getElementById("gallery");

  data.forEach(item => {
    const img = document.createElement("img");
    img.src = item.image;

    img.onclick = () => {
      document.getElementById("viewer").style.display = "flex";
      document.getElementById("fullImg").src = item.image;
    };

    gallery.appendChild(img);
  });
});

// CLOSE FULLSCREEN
document.getElementById("viewer").onclick = () => {
  document.getElementById("viewer").style.display = "none";
};
</script>
