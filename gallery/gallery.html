<style>
  body { font-family: Arial; }
  .gallery {
    display: grid;
    gap: 15px;
    padding: 20px;
    grid-template-columns: repeat(2, 1fr);
  }



  .card {
    border: 1px solid #ddd;
    padding: 10px;
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
  }
  .card:hover {
    transform: scale(1.05);
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    background: white;
  }

    /* FULLSCREEN */
  .fullscreen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
  }

  .fullscreen img {
    max-width: 90%;
    max-height: 90%;
  }
  h2{
    text-align: center;
    font-size: 28px;
    margin: 20px 0;
    color: #2e7d32;
    letter-spacing: 1px;
    text-decoration: underline;
  }
  a{
    color: rgb(12, 12, 12);
  }
  .whatsapp{
    color: white;
    background-color: #28b74b;
    padding: 10px;
  }
  .social-media{
    text-align: center;
    padding-bottom: 30px;
  }
  .media-img{
    width: 25px;margin-left: 15px;
  }
  .contact {
    background: #e8f5e9;
    padding-left: 30px;
    padding-top: 15px;
  }
    .contact-head{
      text-align: left;
  }
    .image-text{
      text-align: center;
      font-weight: 500;      
  }

/* Tablet */
@media (min-width: 600px) and (max-width: 1023px) {
  .gallery {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* Desktop */
@media (min-width: 1024px) {
  .gallery {
    grid-template-columns: repeat(4, 1fr);
  }
}
